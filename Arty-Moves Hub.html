<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Arty-Moves</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #060608; color: #d0d0d4; font-family: 'DM Mono', monospace; min-height: 100vh; }
  body::-webkit-scrollbar { width: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Responsive layout grid classes ── */
  .rg2  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .rg3  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .rg4  { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .rg2x { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }

  /* 7-col day strip — scroll on mobile */
  .day-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 24px; }

  /* Grade picker — compact grid */
  .grade-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 20px; }

  /* Top desktop nav */
  .top-nav { display: flex; align-items: center; gap: 0; flex: 1; }
  .top-bar { border-bottom: 1px solid #2a2a30; position: sticky; top: 0; background: #060608; z-index: 50; }

  /* Bottom mobile nav — hidden by default */
  .bottom-nav { display: none; }

  /* Page content wrapper */
  .page-content { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

  /* Race countdown flex */
  .race-strip { display: flex; gap: 1px; margin-bottom: 24px; }

  /* Horizontal scroll strip for mobile day cards */
  @media (max-width: 767px) {
    /* Nav: hide top, show bottom */
    .top-nav { display: none !important; }
    .top-bar-links { display: none !important; }
    .top-bar-wordmark { flex: 1; text-align: center; }
    .bottom-nav {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: #0c0c10; border-top: 1px solid #2a2a30;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }

    /* Content padding for bottom nav */
    .page-content { padding: 16px 14px 90px; }

    /* 7-day strip → horizontal scroll */
    .day-strip {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px;
      scroll-snap-type: x mandatory; scrollbar-width: none;
      margin-bottom: 16px;
    }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-strip > * { flex: 0 0 calc(38vw); scroll-snap-align: start; min-width: 0; }

    /* Grids → single column */
    .rg2, .rg3, .rg4 { grid-template-columns: 1fr; gap: 8px; }
    .rg2x { grid-template-columns: 1fr; gap: 12px; }

    /* Race strip → stack on very narrow screens */
    .race-strip { flex-direction: column; gap: 4px; }

    /* Grade grid on mobile — 5 per row */
    .grade-grid button { flex: 0 0 calc(20% - 4px); min-width: 0; }

    /* Climbing section */
    .climb-log-grid { flex-direction: column; }

    /* Section labels smaller */
    body { font-size: 13px; }
  }

  @media (min-width: 768px) and (max-width: 1023px) {
    .rg3 { grid-template-columns: 1fr 1fr; }
    .rg4 { grid-template-columns: 1fr 1fr; }
    .page-content { padding: 24px 20px 80px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// ─── Responsive hook ─────────────────────────────────────────────────────────
function useMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 768);
  useEffect(() => {
    const mq = window.matchMedia("(max-width: 767px)");
    const handler = e => setMobile(e.matches);
    mq.addEventListener("change", handler);
    setMobile(mq.matches);
    return () => mq.removeEventListener("change", handler);
  }, []);
  return mobile;
}

const C = {
  bg: "#060608", surface: "#0c0c10", border: "#2a2a30", borderLight: "#3a3a42",
  accent: "#8af0c0", green: "#8af0c0", yellow: "#f0e68a", blue: "#8ac8f0",
  purple: "#c8a0f0", red: "#f08a8a", orange: "#f0b88a",
  text: "#d0d0d4", textMid: "#78787e", textDim: "#48484e",
};

const RACES = [
  { name: "Hyrox Singles Open Toronto", date: new Date("2026-10-04"), priority: "A", color: C.accent },
  { name: "Toronto Waterfront Marathon",  date: new Date("2026-10-18"), priority: "B", color: C.blue },
];

const WEEK = [
  { day: "Mon", label: "Monday",    type: "run",      color: C.green,   icon: "🏃",  session: "Easy Run",      target: "5–6 km · HR <150",         abc: "C",  duration: "30–40 min",  detail: "Zone 2 aerobic base. Conversational pace. Run fresh — no lifting yesterday.", sub: "Anti-extension core (C) post-run or evening" },
  { day: "Tue", label: "Tuesday",   type: "strength", color: C.purple,  icon: "💪",  session: "D1 · Pull & Carry", target: "DL 5×5 @ 315 + 6 more", abc: "—",  duration: "75–85 min", detail: "Deadlift leads. Posterior chain + core gap-plugs. Hyrox finishers at end.", sub: "Sled Pull + Farmers Carry (2 sets each)" },
  { day: "Wed", label: "Wednesday", type: "run",      color: C.green,   icon: "🏃",  session: "Easy Run",      target: "5–6 km · HR <150",         abc: "B",  duration: "30–40 min",  detail: "Second aerobic session. HR cap is non-negotiable. Walk if needed to stay sub-150.", sub: "Anti-lateral flexion (B) post-run or evening" },
  { day: "Thu", label: "Thursday",  type: "strength", color: C.purple,  icon: "🏋️", session: "D2 · Push & Squat", target: "BP 4×5 @ 135 + 5 more", abc: "—",  duration: "75–85 min", detail: "Bench is priority — goes first while fresh. Squat second. Rear delts + calves at end.", sub: "Sled Push + Wall Balls (2 sets each)" },
  { day: "Fri", label: "Friday",    type: "bike",     color: C.blue,    icon: "🚴",  session: "Zwift Z2 Ride", target: "180–200 W · HR <150",      abc: "A",  duration: "60–75 min",  detail: "Cross-train recovery. Legs move, system aerobic, no pounding. Step-ups + glute med after.", sub: "Hip flexor + Glute Med (A) — clears before Sunday" },
  { day: "Sat", label: "Saturday",  type: "flex",     color: C.textMid, icon: "🧗",  session: "Flex",          target: "Climb / rest / light spin", abc: "B*", duration: "—",          detail: "Auto-regulated. If climbing, skip B block. If resting, do B. If beat up, full rest.", sub: "B block only if resting (not climbing)" },
  { day: "Sun", label: "Sunday",    type: "longrun",  color: C.orange,  icon: "🏃",  session: "Long Run",      target: "10→28 km build · HR <150", abc: "C*", duration: "60–180 min", detail: "Solo first km then join friends for 8 km. Longest run of the week. HR cap strict — walk to stay aerobic.", sub: "C block optional — skip if wiped from long run" },
];

const PRINCIPLES = [
  { text: "Running is priority — placed on fresh legs Mon / Wed / Sun.", color: C.green },
  { text: "Push strength = priority lift — bench goes first on D2 while fresh.", color: C.purple },
  { text: "HR 150 cap on all aerobic work. Non-negotiable.", color: C.red },
  { text: "Long run drives marathon prep + fixes Hyrox run limiter simultaneously.", color: C.orange },
  { text: "If HRV drops or sleep sub-6h → cut Fri bike or shorten Sun long run first.", color: C.blue },
  { text: "ABC = 4-5 slots/week. A×1, B×2, C×2. Skip any if HRV is low.", color: C.yellow },
];

// Long run build: 9 weeks, 10→28km. Deloads at W4 and W8.
const LONG_RUN_BUILD = [
  { week: 1, km: 10 }, { week: 2, km: 12 }, { week: 3, km: 15 }, { week: 4, km: 10, deload: true },
  { week: 5, km: 18 }, { week: 6, km: 20 }, { week: 7, km: 23 }, { week: 8, km: 15, deload: true },
  { week: 9, km: 28, peak: true },
];

const WEEKLY_VOL = [
  { week: 1, km: 21 }, { week: 2, km: 24 }, { week: 3, km: 28 }, { week: 4, km: 21, deload: true },
  { week: 5, km: 30 }, { week: 6, km: 33 }, { week: 7, km: 36 }, { week: 8, km: 24, deload: true },
  { week: 9, km: 40, peak: true },
];

const TABS = [
  { id: "strength",  label: "Strength",      icon: "🏋️" },
  { id: "runs",      label: "Runs / Cardio", icon: "🏃" },
  { id: "weekly",    label: "Weekly Overview",icon: "📅" },
  { id: "analysis",  label: "Muscle Analysis",icon: "📊" },
  { id: "rundev",    label: "Run Development",icon: "📈" },
  { id: "log",       label: "Weekly Log",     icon: "📋" },
];

// ─── Shared primitives ───────────────────────────────────────────────────────
const mono = (size, color, extra = {}) => ({
  fontFamily: "'DM Mono', monospace", fontSize: size, color, ...extra,
});
const space = (size, color, extra = {}) => ({
  fontFamily: "'Space Mono', monospace", fontSize: size, color, ...extra,
});

function Eyebrow({ children }) {
  return <p style={mono(8, C.textDim, { letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 })}>{children}</p>;
}
function SectionLabel({ children, style = {} }) {
  return <p style={{ ...mono(8, C.textDim, { letterSpacing: 2, textTransform: "uppercase" }), borderBottom: `1px solid ${C.border}`, paddingBottom: 6, marginBottom: 12, ...style }}>{children}</p>;
}
function Pill({ children, color = C.accent, active, onClick, small }) {
  const sz = small ? 9 : 10;
  return (
    <button onClick={onClick} style={{
      padding: small ? "3px 8px" : "5px 12px", border: `1px solid ${active ? color : C.border}`,
      background: active ? `${color}15` : "transparent", cursor: "pointer",
      ...mono(sz, active ? color : C.textDim, { textTransform: "uppercase", letterSpacing: 1.5 }),
    }}>{children}</button>
  );
}
function MiniBar({ pct, color }) {
  const [w, setW] = useState(0);
  useEffect(() => { const t = setTimeout(() => setW(pct), 60); return () => clearTimeout(t); }, [pct]);
  return (
    <div style={{ height: 10, background: C.surface, border: `1px solid ${C.border}`, position: "relative", overflow: "hidden" }}>
      <div style={{ height: "100%", width: `${w}%`, background: `${color}44`, borderRight: `2px solid ${color}`, transition: "width 0.7s cubic-bezier(0.22,1,0.36,1)" }} />
      <span style={{ position: "absolute", right: 4, top: 0, bottom: 0, display: "flex", alignItems: "center", ...space(8, color) }}>{pct}%</span>
    </div>
  );
}

// ─── Countdown strip ─────────────────────────────────────────────────────────
function CountdownStrip() {
  const now = new Date();
  return (
    <div className="race-strip">
      {RACES.map((r, i) => {
        const days = Math.ceil((r.date - now) / 86400000);
        return (
          <div key={i} style={{
            flex: 1, padding: "10px 14px",
            border: `1px solid ${r.color}33`, borderLeft: `2px solid ${r.color}`,
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            <div>
              <p style={mono(10, r.color, { marginBottom: 2 })}>{r.name}</p>
              <p style={mono(8, C.textDim)}>{r.date.toLocaleDateString("en-CA", { month: "short", day: "numeric", year: "numeric" })} · {r.priority} Race</p>
            </div>
            <div style={{ textAlign: "right" }}>
              <p style={space(20, r.color, { lineHeight: 1 })}>{days}</p>
              <p style={mono(8, C.textDim)}>days</p>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── WEEKLY OVERVIEW ─────────────────────────────────────────────────────────
function WeeklyOverview() {
  const [selected, setSelected] = useState(null);
  const typeColor = { run: C.green, strength: C.purple, bike: C.blue, flex: C.textMid, longrun: C.orange };
  const abcColor = { "A": C.yellow, "B": C.orange, "C": C.accent };

  return (
    <div>
      <CountdownStrip />

      {/* Day cards */}
      <SectionLabel>Week at a glance — Base Phase</SectionLabel>
      <div className="day-strip">
        {WEEK.map((d, i) => {
          const color = typeColor[d.type] || C.textMid;
          const isSelected = selected === i;
          return (
            <button key={i} onClick={() => setSelected(isSelected ? null : i)} style={{
              padding: "12px 8px", border: `1px solid ${isSelected ? color : C.border}`,
              borderTop: `2px solid ${color}`, background: isSelected ? `${color}0d` : "transparent",
              cursor: "pointer", textAlign: "center", display: "flex", flexDirection: "column", gap: 6, alignItems: "center",
            }}>
              <span style={mono(9, C.textDim, { letterSpacing: 1 })}>{d.day}</span>
              <span style={{ fontSize: 18 }}>{d.icon}</span>
              <span style={mono(8, color, { letterSpacing: 0.5, lineHeight: 1.4 })}>{d.session}</span>
              {d.abc !== "—" && (
                <span style={{
                  ...mono(8, abcColor[d.abc.replace("*","")] || C.textDim),
                  border: `1px solid ${abcColor[d.abc.replace("*","")] || C.border}44`,
                  padding: "1px 5px", letterSpacing: 1,
                }}>ABC {d.abc}</span>
              )}
              <span style={mono(8, C.textDim)}>{d.duration}</span>
            </button>
          );
        })}
      </div>

      {/* Expanded detail */}
      {selected !== null && (
        <div className="fade" style={{
          padding: 16, border: `1px solid ${typeColor[WEEK[selected].type]}33`,
          borderLeft: `2px solid ${typeColor[WEEK[selected].type]}`, marginBottom: 24,
        }}>
          <p style={space(13, typeColor[WEEK[selected].type], { marginBottom: 6 })}>
            {WEEK[selected].icon} {WEEK[selected].session} — {WEEK[selected].label}
          </p>
          <p style={mono(11, C.textMid, { marginBottom: 8, lineHeight: 1.6 })}>{WEEK[selected].target}</p>
          <p style={mono(10, C.text, { lineHeight: 1.7, marginBottom: 8 })}>{WEEK[selected].detail}</p>
          <p style={mono(9, C.textDim, { lineHeight: 1.6 })}>{WEEK[selected].sub}</p>
        </div>
      )}

      {/* Load summary */}
      <SectionLabel>Weekly training load</SectionLabel>
      <div className="rg4" style={{ marginBottom: 24 }}>
        {[
          { label: "Run Volume", value: "20–40 km", sub: "builds week-on-week", color: C.green },
          { label: "Strength", value: "2 sessions", sub: "Tue D1 · Thu D2", color: C.purple },
          { label: "Z2 Cross-train", value: "60–75 min", sub: "Fri Zwift · 180-200W", color: C.blue },
          { label: "ABC Accessory", value: "4–5 slots", sub: "A×1 B×2 C×2/week", color: C.yellow },
        ].map((c, i) => (
          <div key={i} style={{ padding: "12px 14px", border: `1px solid ${c.color}33`, borderLeft: `2px solid ${c.color}` }}>
            <p style={mono(8, C.textDim, { textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 6 })}>{c.label}</p>
            <p style={space(16, c.color, { lineHeight: 1, marginBottom: 4 })}>{c.value}</p>
            <p style={mono(9, C.textDim)}>{c.sub}</p>
          </div>
        ))}
      </div>

      {/* Base principles */}
      <SectionLabel>Base phase principles</SectionLabel>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        {PRINCIPLES.map((p, i) => (
          <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "8px 12px", border: `1px solid ${C.border}`, borderLeft: `2px solid ${p.color}44` }}>
            <span style={mono(9, p.color, { letterSpacing: 0.5, flexShrink: 0, marginTop: 1 })}>→</span>
            <p style={mono(10, C.textMid, { lineHeight: 1.6 })}>{p.text}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── STRENGTH ────────────────────────────────────────────────────────────────
const D1 = {
  label: "D1 · Pull & Carry", day: "Tuesday", color: C.blue,
  exercises: [
    { name: "Deadlift", sets: "4×3→5×5", weight: "315 lbs", tier: "compound", note: "Ramp 135→225→275" },
    { name: "Overhead Press", sets: "4×5→7", weight: "95 lbs", tier: "compound", note: "" },
    { name: "Barbell Row", sets: "3×6→8", weight: "135 lbs", tier: "accessory", note: "" },
    { name: "Walking Lunges", sets: "3×10→14/leg", weight: "2×24 kg", tier: "accessory", note: "" },
    { name: "Hanging Leg Raises", sets: "3×8→12", weight: "BW", tier: "core", note: "Knee-tuck if <8 straight" },
    { name: "Pallof Press", sets: "3×8→12/side", weight: "Band", tier: "core", note: "2 s pause" },

};

  exercises: [
    { name: "Bench Press", sets: "4×5 / 4×3 / 3×5", weight: "135→155 lbs", tier: "compound", note: "Ramp 65→95→135" },
    { name: "Back Squat", sets: "4×3→5", weight: "225 lbs", tier: "compound", note: "Ramp 135→185" },

};
const ABC = [
  { id: "A", label: "Hip flexor + Glute Med", freq: "1×/week (Fri)", color: C.yellow, exes: ["DB Step-ups 3×8/side", "Single-leg Glute Bridge 3×12/side", "Cossack Squat 3×6/side"], goal: "Running stride driver" },
  { id: "B", label: "Anti-lateral flexion", freq: "2×/week (Wed + Sat)", color: C.orange, exes: ["Copenhagen Plank 3×20-30s/side", "DB Suitcase Hold 3×40s/side"], goal: "Obliques + unilateral stability" },
  { id: "C", label: "Anti-extension core", freq: "2×/week (Mon + Sun)", color: C.accent, exes: ["Dead Bug 3×10/side", "DB Pullover + Hollow 3×30s", "Hollow Body Hold 3×30s"], goal: "Lumbar control + bracing" },
];

function WorkoutCard({ w }) {
  const tierColor = { compound: C.accent, accessory: C.yellow, core: C.green };
  return (
    <div style={{ border: `1px solid ${C.border}`, borderLeft: `2px solid ${w.color}`, marginBottom: 12 }}>
      <div style={{ padding: "12px 14px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between" }}>
        <div>

          <p style={mono(9, C.textDim, { marginTop: 2 })}>{w.day}</p>
        </div>
        <p style={mono(9, w.color, { border: `1px solid ${w.color}33`, padding: "1px 8px", alignSelf: "flex-start" })}>BLOCK 1</p>
      </div>
      <div style={{ padding: "10px 14px" }}>
        {w.exercises.map((ex, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: i < w.exercises.length - 1 ? `1px solid ${C.border}` : "none" }}>
            <div style={{ flex: 1 }}>
              <span style={mono(12, C.text)}>{ex.name}</span>

              <span style={{ ...mono(7, tierColor[ex.tier] || C.textDim), border: `1px solid ${(tierColor[ex.tier] || C.textDim)}33`, padding: "0 4px", letterSpacing: 1, textTransform: "uppercase" }}>{ex.tier}</span>

          <p style={mono(8, C.textDim, { letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 5 })}>Hyrox Finishers</p>

        </div>

// ─── CLIMBING TRACKER ────────────────────────────────────────────────────────
const TR_GRADES = ["5.8","5.9","5.10a","5.10b","5.10c","5.10d","5.11a","5.11b","5.11c","5.11d","5.12a","5.12b","5.12c","5.12d","5.13a","5.13b","5.13c"];
const BOULDER_GRADES = ["V0","V1","V2","V3","V4","V5","V6","V7","V8","V9","V10","V11","V12"];
const SEND_TYPES = [
  { id:"flash",    label:"Flash",    icon:"⚡", sub:"First try, no beta" },
  { id:"send",     label:"Send",     icon:"✓",  sub:"Completed" },
  { id:"redpoint", label:"Redpoint", icon:"♦",  sub:"After working it" },
  { id:"attempt",  label:"Attempt",  icon:"○",  sub:"Didn't top out" },
];

function fmtDate(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function ClimbingTracker() {
  const [mode, setMode]   = useState("topRope");
  const [grade, setGrade] = useState(null);
  const [type, setType]   = useState("send");
  const [notes, setNotes] = useState("");
  const [date, setDate]   = useState(fmtDate(new Date()));
  const [view, setView]   = useState("log");
  const [logs, setLogs]   = useState(() => {
    try { return JSON.parse(localStorage.getItem("arty-climb-logs") || "[]"); } catch { return []; }
  });

  const grades = mode === "topRope" ? TR_GRADES : BOULDER_GRADES;
  const modeLogs = logs.filter(l => l.mode === mode);
  const modeColor = mode === "topRope" ? C.blue : C.orange;

  function doLog() {
    if (!grade) return;
    const entry = { id: Date.now(), date, mode, grade, type, notes, ts: Date.now() };
    const next = [entry, ...logs];
    setLogs(next);
    localStorage.setItem("arty-climb-logs", JSON.stringify(next));
    setNotes("");
  }
  function remove(id) {
    const next = logs.filter(l => l.id !== id);
    setLogs(next);
    localStorage.setItem("arty-climb-logs", JSON.stringify(next));
  }

  // Stats
  const sends = modeLogs.filter(l => l.type !== "attempt");
  const gradeOrder = grades;
  const gradeCount = {};
  sends.forEach(s => { gradeCount[s.grade] = (gradeCount[s.grade] || 0) + 1; });
  const pb = gradeOrder.slice().reverse().find(g => gradeCount[g]);
  const maxCount = Math.max(1, ...Object.values(gradeCount));

  return (
    <div>
      {/* Mode + view toggle */}
      <div style={{ display:"flex", gap:4, marginBottom:20, alignItems:"center" }}>
        <button onClick={() => setMode("topRope")} style={{ padding:"6px 14px", border:`1px solid ${mode==="topRope"?C.blue:C.border}`, background:mode==="topRope"?`${C.blue}15`:"transparent", cursor:"pointer", ...mono(10, mode==="topRope"?C.blue:C.textDim, {letterSpacing:1.5,textTransform:"uppercase"}) }}>Top Rope</button>
        <button onClick={() => setMode("bouldering")} style={{ padding:"6px 14px", border:`1px solid ${mode==="bouldering"?C.orange:C.border}`, background:mode==="bouldering"?`${C.orange}15`:"transparent", cursor:"pointer", ...mono(10, mode==="bouldering"?C.orange:C.textDim, {letterSpacing:1.5,textTransform:"uppercase"}) }}>Bouldering</button>
        <div style={{flex:1}} />
        {["log","history","stats"].map(v => (
          <button key={v} onClick={() => setView(v)} style={{ padding:"4px 10px", border:`1px solid ${view===v?C.accent:C.border}`, background:view===v?`${C.accent}15`:"transparent", cursor:"pointer", ...mono(9, view===v?C.accent:C.textDim, {letterSpacing:1,textTransform:"uppercase"}) }}>{v}</button>
        ))}
      </div>

      {/* LOG view */}
      {view === "log" && (
        <div className="rg2x">
          <div>
            <SectionLabel>Grade — {mode==="topRope"?"Top Rope":"Bouldering"}</SectionLabel>
            <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:20 }}>
              {grades.map(g => {
                const sel = grade === g;
                return (
                  <button key={g} onClick={() => setGrade(g)} style={{
                    padding:"5px 10px", border:`1px solid ${sel?modeColor:C.border}`,
                    background:sel?`${modeColor}18`:"transparent", cursor:"pointer",
                    ...mono(11, sel?modeColor:C.textMid),
                  }}>{g}</button>
                );
              })}
            </div>
            <SectionLabel>Result</SectionLabel>
            <div style={{ display:"flex", gap:4, marginBottom:20 }}>
              {SEND_TYPES.map(t => (
                <button key={t.id} onClick={() => setType(t.id)} style={{
                  flex:1, padding:"10px 6px", border:`1px solid ${type===t.id?C.accent:C.border}`,
                  background:type===t.id?`${C.accent}10`:"transparent", cursor:"pointer", textAlign:"center",
                }}>
                  <div style={space(16, type===t.id?C.accent:C.textMid)}>{t.icon}</div>
                  <div style={mono(9, type===t.id?C.accent:C.textDim, {marginTop:3,letterSpacing:1})}>{t.label}</div>
                  <div style={mono(8, C.textDim, {marginTop:1})}>{t.sub}</div>
                </button>
              ))}
            </div>
          </div>

          <div>
            <SectionLabel>Session</SectionLabel>
            <div style={{ padding:"12px 14px", border:`1px solid ${C.border}`, marginBottom:12 }}>
              <p style={mono(8, C.textDim, {textTransform:"uppercase",letterSpacing:1.5,marginBottom:6})}>Date</p>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`, padding:"6px 8px", ...mono(11, C.text), outline:"none", marginBottom:12 }} />
              <p style={mono(8, C.textDim, {textTransform:"uppercase",letterSpacing:1.5,marginBottom:6})}>Notes</p>
              <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Beta, conditions, feelings..." style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`, padding:"6px 8px", ...mono(11, C.text), outline:"none" }} />
            </div>

            {/* Selected state */}
            {grade && (
              <div style={{ padding:"12px 14px", border:`1px solid ${modeColor}33`, borderLeft:`2px solid ${modeColor}`, marginBottom:12 }}>
                <p style={mono(8, C.textDim, {textTransform:"uppercase",letterSpacing:1.5,marginBottom:4})}>Ready to log</p>
                <p style={space(22, modeColor)}>{grade}</p>
                <p style={mono(10, C.textMid)}>{SEND_TYPES.find(t=>t.id===type)?.icon} {SEND_TYPES.find(t=>t.id===type)?.label}</p>
              </div>
            )}

            <button onClick={doLog} disabled={!grade} style={{
              width:"100%", padding:"12px",
              border:`1px solid ${grade?C.accent:C.border}`,
              background:grade?`${C.accent}15`:"transparent",
              cursor:grade?"pointer":"default",
              ...space(12, grade?C.accent:C.textDim, {letterSpacing:1}),
            }}>
              {grade?`Log ${grade} ${SEND_TYPES.find(t=>t.id===type)?.label} →`:"Select a grade first"}
            </button>

            {/* Recent 5 */}
            {modeLogs.length > 0 && (
              <div style={{marginTop:16}}>
                <SectionLabel>Recent</SectionLabel>
                {modeLogs.slice(0,6).map(l => (
                  <div key={l.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:`1px solid ${C.border}` }}>
                    <span style={mono(9, C.textDim, {flexShrink:0})}>{l.date}</span>
                    <span style={space(12, l.type==="attempt"?C.textDim:modeColor, {width:52,flexShrink:0})}>{l.grade}</span>
                    <span style={mono(8, C.textDim, {flex:1})}>{SEND_TYPES.find(t=>t.id===l.type)?.icon} {l.type}</span>
                    {l.notes && <span style={mono(8, C.textDim, {maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"})}>{l.notes}</span>}
                    <button onClick={()=>remove(l.id)} style={{background:"none",border:"none",cursor:"pointer",...mono(11,C.red),flexShrink:0}}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* HISTORY view */}
      {view === "history" && (
        <div>
          {modeLogs.length === 0
            ? <p style={mono(11, C.textDim, {padding:"32px 0", textAlign:"center"})}>No {mode==="topRope"?"top rope":"bouldering"} sessions logged yet.</p>
            : modeLogs.map(l => (
              <div key={l.id} style={{ display:"flex", gap:12, alignItems:"center", padding:"9px 0", borderBottom:`1px solid ${C.border}` }}>
                <span style={mono(10, C.textDim, {width:90,flexShrink:0})}>{l.date}</span>
                <span style={space(14, l.type==="attempt"?C.textDim:modeColor, {width:60,flexShrink:0})}>{l.grade}</span>
                <span style={mono(9, C.textDim, {width:80,flexShrink:0,textTransform:"uppercase",letterSpacing:1})}>{SEND_TYPES.find(t=>t.id===l.type)?.icon} {l.type}</span>
                <span style={mono(9, C.textDim, {flex:1})}>{l.notes}</span>
                <button onClick={()=>remove(l.id)} style={{background:"none",border:"none",cursor:"pointer",...mono(11,C.red),padding:"0 4px"}}>×</button>
              </div>
            ))
          }
        </div>
      )}

      {/* STATS view */}
      {view === "stats" && (
        <div>
          {pb && (
            <div style={{ marginBottom:20, padding:"14px 16px", border:`1px solid ${modeColor}33`, borderLeft:`2px solid ${modeColor}` }}>
              <p style={mono(8, C.textDim, {textTransform:"uppercase",letterSpacing:2,marginBottom:6})}>Personal Best — {mode==="topRope"?"Top Rope":"Bouldering"}</p>
              <p style={space(32, modeColor)}>{pb}</p>
              <p style={mono(9, C.textDim, {marginTop:4})}>{sends.length} total sends · {modeLogs.filter(l=>l.type==="attempt").length} attempts</p>
            </div>
          )}
          <SectionLabel>Grade distribution — sends only</SectionLabel>
          {gradeOrder.filter(g => gradeCount[g]).length === 0
            ? <p style={mono(10, C.textDim, {padding:"16px 0"})}>No sends logged yet.</p>
            : gradeOrder.filter(g => gradeCount[g]).map(g => (
              <div key={g} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:5 }}>
                <span style={mono(11, C.textMid, {width:48,flexShrink:0})}>{g}</span>
                <div style={{flex:1, height:14, background:C.surface, border:`1px solid ${C.border}`, position:"relative"}}>
                  <div style={{height:"100%", width:`${Math.round((gradeCount[g]/maxCount)*100)}%`, background:`${modeColor}44`, borderRight:`2px solid ${modeColor}`, transition:"width 0.5s ease"}} />
                </div>
                <span style={space(11, modeColor, {width:20,flexShrink:0})}>{gradeCount[g]}</span>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

function Analysis() {
  const well = COVERAGE_SUMMARY.filter(m => m.pct >= 70).length;

  const gap  = COVERAGE_SUMMARY.filter(m => m.pct < 40).length;
  const avg  = Math.round(COVERAGE_SUMMARY.reduce((a, m) => a + m.pct, 0) / COVERAGE_SUMMARY.length);
  const groups = [...new Set(COVERAGE_SUMMARY.map(m => m.group))];

  function color(pct) { return pct >= 70 ? C.green : pct >= 40 ? C.yellow : C.red; }

          </div>

      </div>
    </div>
  );
}

      </div>

      {/* HR development */}

      <div className="rg3">
        {[
          { phase: "Base (now→Jun 20)", focus: "Z2 only · Build aerobic engine · HR <150 on all runs · No tempo", color: C.green },
          { phase: "Build (Jun 20→Aug 15)", focus: "Introduce Z3 tempo · Hyrox run pace intervals · 1 quality session/week", color: C.yellow },
          { phase: "Peak (Aug 15→Sep 20)", focus: "Race pace work · Hyrox 1km repeats at target pace · Sharpen", color: C.orange },
        ].map((p, i) => (
          <div key={i} style={{ padding: "12px 14px", border: `1px solid ${p.color}33`, borderLeft: `2px solid ${p.color}` }}>
            <p style={mono(8, p.color, { textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 8 })}>{p.phase}</p>
            <p style={mono(10, C.textMid, { lineHeight: 1.7 })}>{p.focus}</p>

}

// ─── WEEKLY LOG & EXPORT ──────────────────────────────────────────────────

function getIsoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return { year: d.getUTCFullYear(), week: weekNum };
}

function getWeekInfo(offset = 0) {
  const now = new Date();
  now.setDate(now.getDate() + offset * 7);
  const dayOfWeek = now.getDay() || 7; // Mon=1..Sun=7
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dayOfWeek - 1));
  monday.setHours(0, 0, 0, 0);
  const { year, week } = getIsoWeek(monday);
  const id = `${year}-W${String(week).padStart(2, "0")}`;
  const dates = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return fmtDate(d);
  });
  return { id, year, week, dates, start: dates[0], end: dates[6] };
}

const LOG_STATUS = [
  { id: "completed", label: "Done",    color: C.green },
  { id: "partial",   label: "Partial", color: C.yellow },
  { id: "missed",    label: "Missed",  color: C.red },
  { id: "rest",      label: "Rest",    color: C.textMid },
  { id: "swapped",   label: "Swapped", color: C.blue },
];

function parseHrCeiling(s) {
  const m = String(s || "").match(/HR\s*<?\s*(\d+)/i);
  return m ? parseInt(m[1], 10) : 150;
}
function parseWeightLbs(s) {
  if (!s) return null;
  const m = String(s).match(/([\d.]+)/);
  return m ? parseFloat(m[1]) : null;
}
function parseDurationMin(s) {
  const nums = String(s || "").match(/\d+/g);
  if (!nums) return null;
  return parseInt(nums[nums.length - 1], 10);
}
function parseSets(s) {
  const m = String(s || "").match(/(\d+)\s*[×x]/);
  return m ? parseInt(m[1], 10) : null;
}
function parseRepsTarget(s) {
  const parts = String(s || "").split(/[×x]/);
  return parts.length > 1 ? parts.slice(1).join("×").trim() : "";
}

function mapPlanEntry(w, date) {
  const base = {
    day: w.day, date, type: w.type, session_name: w.session,
    framework_basis:
      (w.type === "run" || w.type === "longrun")
        ? "Daniels Phase I base + Uphill Athlete HR cap"
      : w.type === "strength"
        ? "Viada concurrent ordering + Zatsiorsky W1→W3 rep accumulation"
      : w.type === "bike"
        ? "Z2 cross-train recovery"
        : "auto-regulated",
  };
  if (w.type === "run" || w.type === "longrun") {
    base.target = {
      duration_min: parseDurationMin(w.duration),
      hr_ceiling_bpm: parseHrCeiling(w.target),
      notes: w.target,
    };
  } else if (w.type === "strength") {
    const src = w.day === "Tue" ? D1 : D2;
    base.block_id = w.day === "Tue" ? "D1" : "D2";
    base.target = {
      session_name: src.label,
      lifts: src.exercises.map(ex => ({
        name: ex.name,
        sets: parseSets(ex.sets),
        reps_target: parseRepsTarget(ex.sets),
        weight_lbs: parseWeightLbs(ex.weight),
        tier: ex.tier,
        note: ex.note || null,
      })),
      finishers: src.finishers.map(f => ({ text: f })),
    };
  } else if (w.type === "bike") {
    base.target = {
      duration_min: parseDurationMin(w.duration),
      hr_ceiling_bpm: parseHrCeiling(w.target),
      power_target: w.target,
      notes: w.target,
    };
  } else {
    base.target = { notes: w.target + " · " + w.detail };
  }
  return base;
}

function buildExportPayload(weekInfo, logData) {
  const plan = WEEK.map((w, i) => mapPlanEntry(w, weekInfo.dates[i]));
  const reconciliation = logData.days.map((d, i) => ({
    plan_day: d.day,
    plan_type: WEEK[i].type,
    status: d.status || "unlogged",
    adherence_notes: d.adherence || "",
  }));
  const subjective_notes = logData.days
    .filter(d => d.rpe != null || d.notes || (d.flags && d.flags.length))
    .map(d => ({
      plan_day: d.day,
      rpe: d.rpe,
      felt: d.notes || "",
      flags: d.flags || [],
    }));
  return {
    schema_version: "base-phase-weekly-export-v1",
    week_id: weekInfo.id,
    week_start: weekInfo.start,
    week_end: weekInfo.end,
    exported_at: new Date().toISOString(),
    plan,
    reconciliation,
    subjective_notes,
    meta: {
      phase: "base",
      source_app: "arty-moves",
      athlete: "Artem Kobelev",
    },
  };
}

function defaultLogData(weekInfo) {
  return {
    weekId: weekInfo.id,
    days: WEEK.map((w, i) => ({
      day: w.day, date: weekInfo.dates[i],
      status: null, rpe: null, notes: "", flags: [], adherence: "",
    })),
  };
}

function WeeklyLog() {
  const [weekOffset, setWeekOffset] = useState(0);
  const weekInfo = useMemo(() => getWeekInfo(weekOffset), [weekOffset]);
  const storageKey = `arty-export-week-${weekInfo.id}`;

  const [logData, setLogData] = useState(() => {
    try {
      const raw = localStorage.getItem(storageKey);
      if (raw) return JSON.parse(raw);
    } catch {}
    return defaultLogData(weekInfo);
  });

  useEffect(() => {
    try {
      const raw = localStorage.getItem(storageKey);
      if (raw) { setLogData(JSON.parse(raw)); return; }
    } catch {}
    setLogData(defaultLogData(weekInfo));
  }, [weekInfo.id]);

  useEffect(() => {
    localStorage.setItem(storageKey, JSON.stringify(logData));
  }, [logData, storageKey]);

  function updateDay(i, patch) {
    setLogData(prev => ({
      ...prev,
      days: prev.days.map((d, idx) => idx === i ? { ...d, ...patch } : d),
    }));
  }

  function exportWeek() {
    const payload = buildExportPayload(weekInfo, logData);
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `arty-moves-${weekInfo.id}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  const typeColor = { run: C.green, strength: C.purple, bike: C.blue, flex: C.textMid, longrun: C.orange };
  const logged = logData.days.filter(d => d.status).length;
  const navBtn = (content, onClick, active) => (
    <button onClick={onClick} style={{
      padding: "4px 10px", border: `1px solid ${active ? C.accent : C.border}`,
      background: active ? `${C.accent}15` : "transparent", cursor: "pointer",
      ...mono(11, active ? C.accent : C.textMid, { letterSpacing: 1 }),
    }}>{content}</button>
  );

  return (
    <div className="fade">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
        <div>
          <Eyebrow>Check-in · Export for coaching pipeline</Eyebrow>
          <p style={space(18, C.text)}>Weekly Log</p>
        </div>
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          {navBtn("←", () => setWeekOffset(o => o - 1))}
          <div style={{ padding: "6px 12px", border: `1px solid ${C.border}`, ...mono(10, C.text, { letterSpacing: 1 }) }}>
            {weekInfo.id}
          </div>
          {navBtn("→", () => setWeekOffset(o => o + 1))}
          {weekOffset !== 0 && navBtn("Today", () => setWeekOffset(0), true)}
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, padding: "10px 14px", border: `1px solid ${C.accent}33`, borderLeft: `2px solid ${C.accent}`, background: `${C.accent}08`, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 160 }}>
          <p style={mono(9, C.textDim, { textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 2 })}>
            {logged}/7 sessions logged
          </p>
          <p style={mono(9, C.textMid)}>{weekInfo.start} → {weekInfo.end}</p>
        </div>
        <button onClick={exportWeek} style={{
          padding: "8px 16px", border: `1px solid ${C.accent}`, background: `${C.accent}20`,
          cursor: "pointer", ...mono(10, C.accent, { letterSpacing: 1, textTransform: "uppercase" }),
        }}>Export Week ↓</button>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {WEEK.map((w, i) => {
          const day = logData.days[i];
          const color = typeColor[w.type] || C.textMid;
          return (
            <div key={i} style={{ padding: "12px 14px", border: `1px solid ${C.border}`, borderLeft: `2px solid ${color}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, marginBottom: 10, flexWrap: "wrap" }}>
                <div>
                  <p style={mono(9, C.textDim, { textTransform: "uppercase", letterSpacing: 1.5 })}>
                    {w.day} · {weekInfo.dates[i]}
                  </p>
                  <p style={space(13, color, { marginTop: 2 })}>
                    {w.icon} {w.session}
                  </p>
                  <p style={mono(9, C.textDim, { marginTop: 2 })}>{w.target}</p>
                </div>
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
                {LOG_STATUS.map(s => {
                  const active = day.status === s.id;
                  return (
                    <button key={s.id} onClick={() => updateDay(i, { status: active ? null : s.id })} style={{
                      padding: "3px 9px", border: `1px solid ${active ? s.color : C.border}`,
                      background: active ? `${s.color}18` : "transparent", cursor: "pointer",
                      ...mono(9, active ? s.color : C.textDim, { letterSpacing: 1, textTransform: "uppercase" }),
                    }}>{s.label}</button>
                  );
                })}
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <span style={mono(9, C.textDim, { width: 76, textTransform: "uppercase", letterSpacing: 1, flexShrink: 0 })}>
                  RPE {day.rpe ?? "—"}/10
                </span>
                <input
                  type="range" min="0" max="10" step="1"
                  value={day.rpe == null ? 0 : day.rpe}
                  onChange={e => {
                    const v = parseInt(e.target.value);
                    updateDay(i, { rpe: v === 0 ? null : v });
                  }}
                  style={{ flex: 1, accentColor: color }}
                />
              </div>

              <input
                value={day.notes}
                onChange={e => updateDay(i, { notes: e.target.value })}
                placeholder="How did it feel? Anything notable..."
                style={{
                  width: "100%", background: C.surface, border: `1px solid ${C.border}`,
                  padding: "6px 8px", ...mono(11, C.text), outline: "none",
                }}
              />
            </div>
          );
        })}
      </div>

      <p style={mono(9, C.textDim, { marginTop: 20, textAlign: "center", lineHeight: 1.6 })}>
        Export downloads JSON to your Downloads folder.<br />
        The Python pipeline picks it up on Sunday runs.
      </p>
    </div>
  );
}

  const isMobile = useMobile();
  function switchTab(id) { setTab(id); localStorage.setItem("arty-hub-tab", id); }

  const renderContent = () => {
    if (tab === "weekly")   return <WeeklyOverview />;
    if (tab === "strength") return <Strength />;
    if (tab === "runs")     return <Runs />;
    if (tab === "analysis") return <Analysis />;
    if (tab === "rundev")   return <RunDev />;
    if (tab === "log")      return <WeeklyLog />;
    return <WeeklyOverview />;
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      {/* Top bar — desktop */}
      <div className="top-bar" style={{ height: 48 }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px", display: "flex", alignItems: "center", height: 48 }}>
          <span className="top-bar-wordmark" style={space(14, C.accent, { marginRight: 32, letterSpacing: 1, flexShrink: 0 })}>ARTY-MOVES</span>
          <div className="top-nav">
            {TABS.map(t => (
              <button key={t.id} onClick={() => switchTab(t.id)} style={{
                padding: "0 16px", height: 48, border: "none",
                borderBottom: tab === t.id ? `2px solid ${C.accent}` : `2px solid transparent`,
                background: "transparent", cursor: "pointer",
                ...mono(10, tab === t.id ? C.accent : C.textDim, { textTransform: "uppercase", letterSpacing: 1.5 }),
                whiteSpace: "nowrap",
              }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
          <div className="top-bar-links" style={{ display: "flex", gap: 16, alignItems: "center", marginLeft: "auto" }}>
            <a href="Arty-Moves Preview.html" style={{ ...mono(9, C.textDim, { letterSpacing: 1.5, textTransform: "uppercase", textDecoration: "none" }) }}>Tracker ↗</a>
            <a href="Muscle Coverage.html" style={{ ...mono(9, C.textDim, { letterSpacing: 1.5, textTransform: "uppercase", textDecoration: "none" }) }}>Analysis ↗</a>
          </div>
        </div>
      </div>

      {/* Mobile top bar — wordmark only */}
      {isMobile && (
        <div style={{ height: 44, borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", position: "sticky", top: 0, background: C.bg, zIndex: 50 }}>
          <span style={space(13, C.accent, { letterSpacing: 2 })}>ARTY-MOVES</span>
        </div>
      )}

      {/* Content */}
      <div className="page-content">
        {renderContent()}
      </div>

      {/* Bottom nav — mobile */}
      <nav className="bottom-nav">
        {TABS.map(t => (
          <button key={t.id} onClick={() => switchTab(t.id)} style={{
            flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
            justifyContent: "center", gap: 3, padding: "6px 0",
            background: "transparent", border: "none", cursor: "pointer",
            borderTop: `2px solid ${tab === t.id ? C.accent : "transparent"}`,
          }}>
            <span style={{ fontSize: 18, lineHeight: 1 }}>{t.icon}</span>
            <span style={mono(8, tab === t.id ? C.accent : C.textDim, { letterSpacing: 1, textTransform: "uppercase" })}>
              {t.label.split(" / ")[0].split(" ")[0]}
            </span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
