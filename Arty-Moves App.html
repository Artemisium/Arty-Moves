<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<title>Arty-Moves · Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #060608; min-height: 100vh; font-family: 'DM Mono', monospace; color: #d0d0d4; }
  body::-webkit-scrollbar { width: 0; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Top bar — back to Hub, mirrors Hub.html styling */
  .hub-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999; height: 36px;
    background: #060608; border-bottom: 1px solid #2a2a30;
    display: flex; align-items: center; padding: 0 16px; gap: 16px;
  }
  .hub-nav a, .hub-nav span {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none;
  }
  .hub-nav a { color: #8af0c0; }
  .hub-nav .current { color: #78787e; cursor: default; }
  .hub-nav .sep { color: #2a2a30; }
  .hub-nav .spacer { flex: 1; }
  .hub-nav .brand { color: #8af0c0; letter-spacing: 2px; font-family: 'Space Mono', monospace; font-size: 12px; }

  /* Everything below the bar */
  #root { padding-top: 36px; min-height: calc(100vh - 36px); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="muscle-map.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  function Shell() {
    return (
      <>
        <nav className="hub-nav">
          <a href="Arty-Moves Hub.html">← Hub</a>
          <span className="sep">|</span>
          <span className="current">Strength Tracker</span>
          <span className="spacer"></span>
          <span className="brand">ARTY-MOVES</span>
        </nav>
        <ArtyMovesApp/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Shell/>);
</script>
</body>
</html>
