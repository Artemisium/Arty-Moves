<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Arty-Moves — Current Design</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0a0a0d; min-height: 100vh; font-family: 'DM Mono', monospace; color: #d0d0d4; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .page {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px;
    gap: 32px;
  }
  .caption { text-align: center; max-width: 430px; }
  .caption .eyebrow { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #48484e; margin: 0 0 6px; }
  .caption h1 { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 400; color: #d0d0d4; margin: 0 0 6px; letter-spacing: 0.5px; }
  .caption p { font-size: 11px; color: #78787e; margin: 0; line-height: 1.6; }
  .caption .meta { font-size: 9px; color: #48484e; margin-top: 10px; letter-spacing: 1px; text-transform: uppercase; }

  /* scale the 402px device inside iOS frame naturally */
  .device-wrap { transform: scale(1); transform-origin: top center; }

  /* hide scrollbars inside device chrome */
  .device-wrap ::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* Hub nav bar */
  .hub-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 999; height: 36px; background: #060608; border-bottom: 1px solid #2a2a30; display: flex; align-items: center; padding: 0 20px; gap: 20px; }
  .hub-nav a { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; color: #8af0c0; }
  .hub-nav .current { color: #78787e; cursor: default; }
  .hub-nav .sep { color: #2a2a30; }
  .page { padding-top: 56px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="muscle-map.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  function Shell() {
    return (
      <>
        <nav className="hub-nav">
          <a href="Arty-Moves Hub.html">← Hub</a>
          <span className="sep">|</span>
          <span className="current">Strength Tracker</span>
          <span className="sep">|</span>
          <a href="Muscle Coverage.html">Muscle Analysis</a>
        </nav>
        <div className="page">
        <div className="caption">
          <p className="eyebrow">Artemisium / Arty-Moves</p>
          <h1>Current design — main</h1>
          <p>Mobile workout database. Phase → block → week progression. Strength mode wired; run mode stubbed.</p>
          <p className="meta">workout-database.jsx · 416 lines</p>
        </div>
        <div className="device-wrap">
          <IOSDevice width={402} height={874} dark={true}>
            <ArtyMovesApp/>
          </IOSDevice>
        </div>
      </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Shell/>);
</script>
</body>
</html>
