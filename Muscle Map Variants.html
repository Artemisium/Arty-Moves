<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Muscle Map — Color Schemes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #060608; color: #d0d0d4; font-family: 'DM Mono', monospace; min-height: 100vh; }
  .page { padding: 40px 24px 80px; max-width: 1400px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 32px; }
  .header .eyebrow { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #48484e; margin-bottom: 10px; }
  .header h1 { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 400; margin: 0 0 10px; color: #d0d0d4; letter-spacing: 0.5px; }
  .header p { font-size: 11px; color: #78787e; margin: 0 auto; max-width: 620px; line-height: 1.7; }

  .controls { display: flex; justify-content: center; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
  .controls button {
    background: transparent; border: 1px solid #2a2a30; color: #78787e;
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px;
    padding: 6px 10px; cursor: pointer; text-transform: uppercase;
  }
  .controls button.active { border-color: #8af0c0; color: #8af0c0; background: rgba(138,240,192,0.08); }

  .section-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #48484e; margin: 32px 0 14px; text-align: center; }

  .schemes-grid {
    display: grid; gap: 1px;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    background: #1a1a1e;
    border: 1px solid #1a1a1e;
  }
  .scheme-cell {
    background: #060608;
    padding: 20px 12px 18px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    position: relative;
  }
  .scheme-cell .bg-pad {
    display: flex; align-items: center; justify-content: center;
    min-height: 220px;
  }
  .scheme-cell .label {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #d0d0d4;
    font-weight: 500;
  }
  .scheme-cell .sub {
    font-size: 8px; color: #48484e; letter-spacing: 1px; text-transform: uppercase;
  }
  .scheme-cell .swatches { display: flex; gap: 3px; margin-top: 2px; }
  .scheme-cell .swatches span { width: 12px; height: 12px; display: block; border-radius: 1px; }

  .rows-section { margin-top: 56px; }
  .rows-section .section-label { margin-top: 0; }
  .rows-wrap { max-width: 460px; margin: 0 auto; border: 1px solid #2a2a30; padding: 0 16px; background: #0c0c10; }
  .row { padding: 14px 0; border-bottom: 1px solid #2a2a30; display: flex; justify-content: space-between; gap: 14px; align-items: center; }
  .row:last-child { border-bottom: none; }
  .row .info { flex: 1; min-width: 0; }
  .row .info .name { font-size: 14px; color: #d0d0d4; margin: 0 0 4px; font-family: 'Space Mono', monospace; }
  .row .info .meta { font-size: 10px; color: #78787e; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="muscle-map.jsx"></script>

<script type="text/babel">
const { useState } = React;

const EXERCISES = [
  { name: "Deadlift", sub: "Posterior chain" },
  { name: "Back Squat", sub: "Legs + glutes" },
  { name: "Bench Press", sub: "Push, horizontal" },
  { name: "Overhead Press", sub: "Push, vertical" },
  { name: "Weighted Chin-ups", sub: "Pull, vertical" },
  { name: "Barbell Row", sub: "Pull, horizontal" },
  { name: "Walking Lunges", sub: "Legs, unilateral" },
  { name: "Weighted Dips", sub: "Push, compound" },
];

function App() {
  const [exercise, setExercise] = useState("Deadlift");
  const schemes = Object.keys(window.SCHEMES || {});

  return (
    <div className="page">
      <div className="header">
        <div className="eyebrow">Arty-Moves · muscle map v2</div>
        <h1>Anatomical body + 13 color schemes</h1>
        <p>
          Lean athletic silhouette with individual muscle groups drawn as distinct shapes.
          Non-worked muscles stay visible in a neutral fill so the whole figure always reads.
          Worked muscles light up in the scheme's color at three intensity tiers
          (primary / secondary / stabilizer). Pick an exercise below to compare.
        </p>
      </div>

      <div className="controls">
        {EXERCISES.map(e => (
          <button key={e.name} className={exercise === e.name ? "active" : ""} onClick={() => setExercise(e.name)}>
            {e.name}
          </button>
        ))}
      </div>

      <div className="schemes-grid">
        {schemes.map(id => {
          const s = window.SCHEMES[id];
          return (
            <div key={id} className="scheme-cell">
              <div className="bg-pad">
                <window.MuscleMap exercise={exercise} scheme={id} size={72} />
              </div>
              <div className="label">{s.label}</div>
              <div className="swatches">
                <span style={{ background: s.ramp(1) || "#555" }} />
                <span style={{ background: s.ramp(0.6) || "#555" }} />
                <span style={{ background: s.ramp(0.3) || "#555" }} />
                <span style={{ background: s.neutral, border: "1px solid #333" }} />
              </div>
              <div className="sub">primary · secondary · stabilizer · neutral</div>
            </div>
          );
        })}
      </div>

      <div className="rows-section">
        <div className="section-label">In-context — at row size (56px)</div>
        {schemes.slice(0, 4).map(id => {
          const s = window.SCHEMES[id];
          return (
            <div key={id} style={{ marginBottom: 18 }}>
              <div style={{ textAlign: "center", fontSize: 9, color: "#48484e", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>
                {s.label}
              </div>
              <div className="rows-wrap">
                {EXERCISES.slice(0, 4).map(e => (
                  <div key={e.name} className="row">
                    <div className="info">
                      <div className="name">{e.name}</div>
                      <div className="meta">{e.sub}</div>
                    </div>
                    <window.MuscleMap exercise={e.name} scheme={id} size={56} />
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function boot() {
  if (!window.MuscleMap || !window.SCHEMES) { setTimeout(boot, 40); return; }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
boot();
</script>
</body>
</html>
